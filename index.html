<!DOCTYPE html>
<html lang="az">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-PMZGP4SV');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belleza Premium | Multi-Page Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fafafa; margin: 0; padding: 0; }
        header { background: #d63384; color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        nav { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        nav a { margin: 0 15px; text-decoration: none; color: #d63384; font-weight: bold; cursor: pointer; }
        .page { display: none; padding: 40px; max-width: 800px; margin: auto; }
        .active { display: block; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f0f0f0; }
        .product-card h3 { color: #333; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .view-btn { background: #f8f9fa; color: #d63384; border: 1px solid #d63384; }
        .cart-btn { background: #d63384; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PMZGP4SV"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <header>
        <h1>BELLEZA PREMIUM</h1>
    </header>

    <nav id="main-nav">
        <a onclick="showPage('shampun')">Şampunlar</a>
        <a onclick="showPage('etir')">Ətirlər</a>
        <a onclick="showPage('krem')">Kremlər</a>
    </nav>

    <div id="shampun" class="page active">
        <h2>Saç Qulluğu - Şampunlar</h2>
        <div class="product-grid">
            <div class="product-card">
                <h3>Keratin Shampun</h3>
                <button id="view_shampun_1" class="view-btn">Bax</button>
                <button id="add_shampun_1" class="cart-btn">Səbətə At - 18 AZN</button>
            </div>
            <div class="product-card">
                <h3>Argan Yağı Shampun</h3>
                <button id="view_shampun_2" class="view-btn">Bax</button>
                <button id="add_shampun_2" class="cart-btn">Səbətə At - 22 AZN</button>
            </div>
        </div>
    </div>

    <div id="etir" class="page">
        <h2>Premium Ətirlər</h2>
        <div class="product-grid">
            <div class="product-card">
                <h3>Midnight Rose (EDP)</h3>
                <button id="view_perfume_1" class="view-btn">Bax</button>
                <button id="add_perfume_1" class="cart-btn">Səbətə At - 85 AZN</button>
            </div>
            <div class="product-card">
                <h3>Ocean Breeze</h3>
                <button id="view_perfume_2" class="view-btn">Bax</button>
                <button id="add_perfume_2" class="cart-btn">Səbətə At - 60 AZN</button>
            </div>
        </div>
    </div>

    <div id="krem" class="page">
        <h2>Dəri Kremləri</h2>
        <div class="product-grid">
            <div class="product-card">
                <h3>Gecə Kremi (Anti-age)</h3>
                <button id="view_cream_1" class="view-btn">Bax</button>
                <button id="add_cream_1" class="cart-btn">Səbətə At - 45 AZN</button>
            </div>
            <div class="product-card">
                <h3>Gündüz Kremi (SPF 50)</h3>
                <button id="view_cream_2" class="view-btn">Bax</button>
                <button id="add_cream_2" class="cart-btn">Səbətə At - 35 AZN</button>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            // Bütün səhifələri gizlət
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Seçilən səhifəni göstər
            document.getElementById(pageId).classList.add('active');
            
            // GTM üçün Virtual Page View hadisəsi (Könüllü, gələcəkdə lazım olacaq)
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': 'virtual_pageview',
                'page_title': pageId
            });
        }
    </script>
</body>
</html>
